<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestrator Terminal v0.1</title>
<style>
  :root {
    --bg: #1a1a1e;
    --surface: #24242a;
    --surface-alt: #2c2c34;
    --border: #3a3a44;
    --text: #e0e0e6;
    --text-dim: #8888a0;
    --accent-gpt: #74aa9c;
    --accent-gemini: #8b9cf7;
    --accent-zai: #b8c94e;
    --accent-claude: #d4956a;
    --btn-bg: #32323c;
    --btn-hover: #3e3e4a;
    --btn-active: #4a4a56;
    --danger: #c45c5c;
    --danger-hover: rgba(196,92,92,0.15);
    --save-color: #6bbd6b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Consolas','Courier New',monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 16px; background:var(--surface);
    border-bottom:1px solid var(--border); height:40px; flex-shrink:0;
  }
  .header-title { font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); }
  .header-title span { color:var(--text); }
  .save-indicator { font-size:12px; color:var(--save-color); opacity:0; transition:opacity 0.3s; }
  .save-indicator.show { opacity:1; }

  .main { display:flex; height:calc(100vh - 40px); }

  .col-left {
    width:40%; min-width:280px; display:flex; flex-direction:column;
    border-right:1px solid var(--border); background:var(--surface);
  }
  .input-section {
    flex:1; display:flex; flex-direction:column;
    padding:12px; gap:6px; overflow-y:auto;
  }
  .section-label {
    font-size:11px; text-transform:uppercase; letter-spacing:1px;
    color:var(--text-dim); margin-bottom:1px;
  }

  .darma-group {
    display:flex; flex-direction:column; gap:2px;
    transition: all 0.2s ease;
  }
  .darma-group.hidden-by-focus { display:none !important; }
  .darma-group.focused { flex:1; }
  .darma-header {
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; padding:3px 0; user-select:none;
  }
  .darma-label { font-size:11px; font-weight:600; letter-spacing:0.3px; }
  .darma-label.gpt { color:var(--accent-gpt); }
  .darma-label.gemini { color:var(--accent-gemini); }
  .darma-label.zai { color:var(--accent-zai); }
  .darma-label.claude { color:var(--accent-claude); }

  .focus-btn {
    font-size:10px; color:var(--text-dim); background:none; border:1px solid var(--border);
    border-radius:3px; padding:1px 6px; cursor:pointer; transition:all 0.15s;
  }
  .focus-btn:hover { color:var(--text); border-color:var(--text-dim); }
  .darma-group.focused .focus-btn { color:var(--save-color); border-color:var(--save-color); }

  .darma-textarea {
    min-height:50px; max-height:150px; resize:vertical;
    background:var(--bg); color:var(--text);
    border:1px solid var(--border); border-radius:4px;
    padding:8px 10px; font-family:inherit; font-size:12px;
    line-height:1.4; outline:none; transition:border-color 0.2s;
  }
  .darma-group.focused .darma-textarea {
    flex:1; min-height:0; max-height:none; resize:none;
  }
  .darma-textarea:focus { border-color:var(--text-dim); }
  .darma-textarea::placeholder { color:var(--text-dim); }
  .darma-textarea.gpt:focus { border-color:var(--accent-gpt); }
  .darma-textarea.gemini:focus { border-color:var(--accent-gemini); }
  .darma-textarea.zai:focus { border-color:var(--accent-zai); }
  .darma-textarea.claude:focus { border-color:var(--accent-claude); }

  .controls-area { display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
  .controls-area.hidden-by-focus { display:none !important; }

  .mode-section { display:flex; flex-direction:column; gap:4px; }
  #modeSelect {
    background:var(--bg); color:var(--text);
    border:1px solid var(--border); border-radius:4px;
    padding:7px 10px; font-family:inherit; font-size:12px;
    outline:none; cursor:pointer;
  }
  #modeSelect:focus { border-color:var(--text-dim); }
  #customInstruction {
    background:var(--bg); color:var(--text);
    border:1px solid var(--border); border-radius:4px;
    padding:8px 10px; font-family:inherit; font-size:12px;
    line-height:1.4; resize:vertical; min-height:50px; max-height:120px;
    outline:none; transition:border-color 0.2s;
  }
  #customInstruction:focus { border-color:var(--text-dim); }
  #customInstruction::placeholder { color:var(--text-dim); }
  .custom-hidden { display:none !important; }

  .btn-group { display:flex; flex-direction:column; gap:5px; }
  .btn-copy {
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:8px 12px; border:1px solid var(--border); border-radius:4px;
    background:var(--btn-bg); color:var(--text); font-family:inherit;
    font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s;
    letter-spacing:0.3px; position:relative;
  }
  .btn-copy:hover { background:var(--btn-hover); }
  .btn-copy:active { background:var(--btn-active); }
  .btn-copy[data-target="gpt"] .dot { color:var(--accent-gpt); }
  .btn-copy[data-target="gemini"] .dot { color:var(--accent-gemini); }
  .btn-copy[data-target="zai"] .dot { color:var(--accent-zai); }
  .btn-copy[data-target="claude"] .dot { color:var(--accent-claude); }
  .btn-copy.copied { border-color:var(--save-color); color:var(--save-color); }

  .last-badge {
    font-size:9px; font-weight:700; letter-spacing:0.5px;
    background:var(--text-dim); color:var(--bg);
    padding:1px 5px; border-radius:3px; margin-left:6px;
    display:none;
  }
  .btn-copy.last-copy .last-badge { display:inline; }

  .btn-row { display:flex; gap:6px; }
  .btn-util {
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:8px 12px; border:1px solid var(--border); border-radius:4px;
    background:var(--btn-bg); color:var(--text); font-family:inherit;
    font-size:12px; cursor:pointer; transition:all 0.15s;
  }
  .btn-util:hover { background:var(--btn-hover); }
  .btn-util:active { background:var(--btn-active); }
  .btn-danger { border-color:var(--danger); color:var(--danger); }
  .btn-danger:hover { background:var(--danger-hover); }

  .col-right { flex:1; display:flex; flex-direction:column; background:var(--bg); min-width:0; }

  .tabs {
    display:flex; background:var(--surface);
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .tab {
    flex:1; padding:10px 12px; text-align:center; font-size:12px;
    font-weight:600; letter-spacing:0.5px; color:var(--text-dim);
    cursor:pointer; border-bottom:2px solid transparent;
    transition:all 0.2s; user-select:none;
  }
  .tab:hover { color:var(--text); background:var(--surface-alt); }
  .tab[data-tab="gpt"].active { color:var(--accent-gpt); border-bottom-color:var(--accent-gpt); }
  .tab[data-tab="gemini"].active { color:var(--accent-gemini); border-bottom-color:var(--accent-gemini); }
  .tab[data-tab="zai"].active { color:var(--accent-zai); border-bottom-color:var(--accent-zai); }
  .tab[data-tab="claude"].active { color:var(--accent-claude); border-bottom-color:var(--accent-claude); }
  .tab .shortcut { font-size:10px; opacity:0.5; margin-left:3px; }

  .panels { flex:1; position:relative; overflow:hidden; }
  .panel { position:absolute; inset:0; display:none; padding:12px; }
  .panel.active { display:flex; }
  .panel textarea {
    width:100%; height:100%; background:var(--surface); color:var(--text);
    border:1px solid var(--border); border-radius:4px; padding:10px;
    font-family:inherit; font-size:13px; line-height:1.5;
    resize:none; outline:none; transition:border-color 0.2s;
  }
  .panel[data-panel="gpt"] textarea:focus { border-color:var(--accent-gpt); }
  .panel[data-panel="gemini"] textarea:focus { border-color:var(--accent-gemini); }
  .panel[data-panel="zai"] textarea:focus { border-color:var(--accent-zai); }
  .panel[data-panel="claude"] textarea:focus { border-color:var(--accent-claude); }
  .panel textarea::placeholder { color:var(--text-dim); }

  #fileInput { display:none; }

  @media (max-width:767px) {
    .main { flex-direction:column; overflow-y:auto; }
    .col-left { width:100%; min-width:0; border-right:none; border-bottom:1px solid var(--border); }
    .col-right { min-height:50vh; }
    .tab .shortcut { display:none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title"><span>OT</span> v0.1</div>
  <div class="save-indicator" id="saveIndicator">💾</div>
</div>

<div class="main">
  <div class="col-left">
    <div class="input-section">

      <div class="section-label">Respon Darma per AI</div>

      <div class="darma-group" data-ai="gpt">
        <div class="darma-header">
          <div class="darma-label gpt">● ChatGPT</div>
          <button class="focus-btn" title="Focus mode">⤢</button>
        </div>
        <textarea id="darmaGpt" class="darma-textarea gpt" placeholder="Respon/arahan untuk ChatGPT..."></textarea>
      </div>

      <div class="darma-group" data-ai="gemini">
        <div class="darma-header">
          <div class="darma-label gemini">● Gemini</div>
          <button class="focus-btn" title="Focus mode">⤢</button>
        </div>
        <textarea id="darmaGemini" class="darma-textarea gemini" placeholder="Respon/arahan untuk Gemini..."></textarea>
      </div>

      <div class="darma-group" data-ai="zai">
        <div class="darma-header">
          <div class="darma-label zai">● Z.ai</div>
          <button class="focus-btn" title="Focus mode">⤢</button>
        </div>
        <textarea id="darmaZai" class="darma-textarea zai" placeholder="Respon/arahan untuk Z.ai..."></textarea>
      </div>

      <div class="darma-group" data-ai="claude">
        <div class="darma-header">
          <div class="darma-label claude">● Claude</div>
          <button class="focus-btn" title="Focus mode">⤢</button>
        </div>
        <textarea id="darmaClaude" class="darma-textarea claude" placeholder="Respon/arahan untuk Claude..."></textarea>
      </div>

      <div class="controls-area" id="controlsArea">
        <div class="mode-section">
          <div class="section-label">Mode Instruksi</div>
          <select id="modeSelect">
            <option value="antiyesman">Anti-Yes Man</option>
            <option value="konvergensi">Konvergensi</option>
            <option value="kristalisasi">Kristalisasi</option>
            <option value="custom">Custom</option>
          </select>
          <textarea id="customInstruction" class="custom-hidden" placeholder="Tulis instruksi custom kamu..."></textarea>
        </div>

        <div class="btn-group">
          <div class="section-label">Copy Context</div>
          <button class="btn-copy" data-target="gpt">
            <span class="dot">●</span> Copy for ChatGPT <span class="last-badge">LAST</span>
          </button>
          <button class="btn-copy" data-target="gemini">
            <span class="dot">●</span> Copy for Gemini <span class="last-badge">LAST</span>
          </button>
          <button class="btn-copy" data-target="zai">
            <span class="dot">●</span> Copy for Z.ai <span class="last-badge">LAST</span>
          </button>
          <button class="btn-copy" data-target="claude">
            <span class="dot">●</span> Copy for Claude <span class="last-badge">LAST</span>
          </button>
        </div>

        <div class="btn-row">
          <button class="btn-util" id="btnSave">💾 Save</button>
          <button class="btn-util" id="btnLoad">📂 Load</button>
          <button class="btn-util btn-danger" id="btnClear">✕ Clear All</button>
        </div>
      </div>

    </div>
  </div>

  <div class="col-right">
    <div class="tabs">
      <div class="tab active" data-tab="gpt">ChatGPT <span class="shortcut">Ctrl+1</span></div>
      <div class="tab" data-tab="gemini">Gemini <span class="shortcut">Ctrl+2</span></div>
      <div class="tab" data-tab="zai">Z.ai <span class="shortcut">Ctrl+3</span></div>
      <div class="tab" data-tab="claude">Claude <span class="shortcut">Ctrl+4</span></div>
    </div>
    <div class="panels">
      <div class="panel active" data-panel="gpt">
        <textarea id="respGpt" placeholder="Paste respon ChatGPT di sini..."></textarea>
      </div>
      <div class="panel" data-panel="gemini">
        <textarea id="respGemini" placeholder="Paste respon Gemini di sini..."></textarea>
      </div>
      <div class="panel" data-panel="zai">
        <textarea id="respZai" placeholder="Paste respon Z.ai di sini..."></textarea>
      </div>
      <div class="panel" data-panel="claude">
        <textarea id="respClaude" placeholder="Paste respon Claude di sini..."></textarea>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".json">

<script>
(function() {
  'use strict';

  var SK = {
    DARMA_GPT: 'ot_darma_gpt', DARMA_GEMINI: 'ot_darma_gemini',
    DARMA_ZAI: 'ot_darma_zai', DARMA_CLAUDE: 'ot_darma_claude',
    RESP_GPT: 'ot_resp_gpt', RESP_GEMINI: 'ot_resp_gemini',
    RESP_ZAI: 'ot_resp_zai', RESP_CLAUDE: 'ot_resp_claude',
    MODE: 'ot_mode', CUSTOM: 'ot_custom_instruction',
    TAB: 'ot_active_tab', LAST_COPY: 'ot_last_copy'
  };

  var MODE_TEXT = {
    antiyesman: 'jangan asal yes man. apapun pendapatmu yang terbaik meski beda aku sangat terbuka, jika sepakat cukup perkuat. jadilah obyektif, kritis, bijak dan ahli-berpengalaman dalam domain ini. bagaimana menurutmu?',
    konvergensi: 'Mari berdiskusi sampai tercapai satu kesepakatan bersama. Perbedaan pendapat dan sanggahan tidak masalah, selama tidak ada kesimpulan sepihak. Diskusi boleh berlangsung banyak putaran, karena aku yang berhadapan langsung dengan realitas di lapangan. Mengetahui respons pihak lain saat sarannya disanggah justru membuka wawasan baru. Tidak ada yang sia-sia. Jadilah obyektif, kritis, bijak dan ahli-berpengalaman dalam domain ini dan dalam membangun sistem. bagaimana menurutmu?',
    kristalisasi: 'Diskusi sudah konvergen. Tugasmu sekarang: (1) Generate KARTU KRISTALISASI dengan format: JUDUL, TRIGGER, KONSENSUS, PRINSIP BARU, KONEKSI, TAGS [DOMAIN][PROJECT][PHASE][TYPE], ROUTE (SYSTEM-IMPACT/THINKING-PRINCIPLE/PARKING), ACTION. (2) Generate ORC-STATE_PATCH: section mana yang berubah + isi baru. Jangan diskusi lagi, langsung output.'
  };

  var ROTATION = {
    gpt: ['gemini','zai','claude'], gemini: ['zai','claude','gpt'],
    zai: ['claude','gpt','gemini'], claude: ['gpt','gemini','zai']
  };

  var AI_LABEL = { gpt:'respon chatgpt', gemini:'respon gemini', zai:'respon z.ai', claude:'respon claude' };

  var els = {
    darmaGpt: document.getElementById('darmaGpt'),
    darmaGemini: document.getElementById('darmaGemini'),
    darmaZai: document.getElementById('darmaZai'),
    darmaClaude: document.getElementById('darmaClaude'),
    respGpt: document.getElementById('respGpt'),
    respGemini: document.getElementById('respGemini'),
    respZai: document.getElementById('respZai'),
    respClaude: document.getElementById('respClaude'),
    mode: document.getElementById('modeSelect'),
    custom: document.getElementById('customInstruction'),
    saveInd: document.getElementById('saveIndicator'),
    fileInput: document.getElementById('fileInput'),
    controls: document.getElementById('controlsArea')
  };

  var darmaMap = { gpt:els.darmaGpt, gemini:els.darmaGemini, zai:els.darmaZai, claude:els.darmaClaude };
  var respMap = { gpt:els.respGpt, gemini:els.respGemini, zai:els.respZai, claude:els.respClaude };

  // DEBOUNCE
  var timers = {};
  function debounceSave(key, val) {
    if(timers[key]) clearTimeout(timers[key]);
    els.saveInd.classList.add('show');
    timers[key] = setTimeout(function() {
      try{localStorage.setItem(key,val);}catch(e){}
      els.saveInd.classList.remove('show');
    }, 2000);
  }

  els.darmaGpt.addEventListener('input', function(){debounceSave(SK.DARMA_GPT,this.value);});
  els.darmaGemini.addEventListener('input', function(){debounceSave(SK.DARMA_GEMINI,this.value);});
  els.darmaZai.addEventListener('input', function(){debounceSave(SK.DARMA_ZAI,this.value);});
  els.darmaClaude.addEventListener('input', function(){debounceSave(SK.DARMA_CLAUDE,this.value);});
  els.respGpt.addEventListener('input', function(){debounceSave(SK.RESP_GPT,this.value);});
  els.respGemini.addEventListener('input', function(){debounceSave(SK.RESP_GEMINI,this.value);});
  els.respZai.addEventListener('input', function(){debounceSave(SK.RESP_ZAI,this.value);});
  els.respClaude.addEventListener('input', function(){debounceSave(SK.RESP_CLAUDE,this.value);});
  els.custom.addEventListener('input', function(){debounceSave(SK.CUSTOM,this.value);});

  // MODE
  els.mode.addEventListener('change', function(){
    try{localStorage.setItem(SK.MODE,this.value);}catch(e){}
    toggleCustom(this.value);
  });
  function toggleCustom(m){
    if(m==='custom') els.custom.classList.remove('custom-hidden');
    else els.custom.classList.add('custom-hidden');
  }
  var NAV_BLOK = '\n---\nWAJIB tutup setiap responmu dengan blok ini:\n=== NAVIGASI ORCHESTRATOR ===\nSTATE: [EXPLORING / DISCUSSING / READY_TO_CLOSE / CLOSED]\nNEXT: [rekomendasi langkah selanjutnya, spesifik]\nGAP: [konteks yang kurang / "tidak ada"]\n===\n\nJika STATE = READY_TO_CLOSE atau CLOSED, WAJIB tambahkan:\n=== FRICTION LOG ===\n| FRICTION | CATATAN |\n(isi dengan friction/masalah yang terjadi selama sesi ini: miskomunikasi, AI salah paham konteks, step yang ribet, constraint yang tidak terdeteksi, human error yang terjadi. Jika tidak ada friction: "Tidak ada friction sesi ini.")\n===\nCATATAN: Friction Log ini untuk Darma simpan ke GSheets. JANGAN masukkan ke dalam ORC-STATE saat generate patch.';

  function getInstruction(){
    var m=els.mode.value;
    var base;
    if(m==='custom') base=els.custom.value.trim();
    else base=MODE_TEXT[m]||'';
    return base ? base + NAV_BLOK : '';
  }

  // FOCUS MODE
  var focusedAi = null;
  var headers = document.querySelectorAll('.darma-header');
  for(var h=0;h<headers.length;h++){
    (function(header){
      header.addEventListener('click', function(){
        var ai = header.parentElement.getAttribute('data-ai');
        toggleFocusMode(ai);
      });
    })(headers[h]);
  }

  function toggleFocusMode(ai){
    var groups = document.querySelectorAll('.darma-group');
    if(focusedAi===ai){
      focusedAi=null;
      for(var i=0;i<groups.length;i++){
        groups[i].classList.remove('hidden-by-focus','focused');
      }
      els.controls.classList.remove('hidden-by-focus');
    } else {
      focusedAi=ai;
      for(var j=0;j<groups.length;j++){
        var g=groups[j];
        if(g.getAttribute('data-ai')===ai){
          g.classList.remove('hidden-by-focus');
          g.classList.add('focused');
        } else {
          g.classList.add('hidden-by-focus');
          g.classList.remove('focused');
        }
      }
      els.controls.classList.add('hidden-by-focus');
      darmaMap[ai].focus();
    }
  }

  // COPY ROTATIONAL
  function copyFor(target){
    var parts=[];
    var d=darmaMap[target].value.trim();
    if(d) parts.push('aku (darma):\n'+d);

    var rot=ROTATION[target];
    for(var i=0;i<rot.length;i++){
      var k=rot[i];
      var r=respMap[k].value.trim();
      if(r) parts.push(AI_LABEL[k]+':\n'+r);
      var dm=darmaMap[k].value.trim();
      if(dm) parts.push('aku (darma):\n'+dm);
    }

    var ins=getInstruction();
    if(ins) parts.push(ins);

    var out=parts.join('\n---\n');
    copyToClipboard(out,target);

    try{localStorage.setItem(SK.LAST_COPY,target);}catch(e){}
    updateLastIndicator(target);
  }

  var copyBtns=document.querySelectorAll('.btn-copy');
  for(var i=0;i<copyBtns.length;i++){
    (function(b){b.addEventListener('click',function(){copyFor(b.getAttribute('data-target'));});})(copyBtns[i]);
  }

  // LAST INDICATOR
  function updateLastIndicator(t){
    var bs=document.querySelectorAll('.btn-copy');
    for(var i=0;i<bs.length;i++){
      if(bs[i].getAttribute('data-target')===t) bs[i].classList.add('last-copy');
      else bs[i].classList.remove('last-copy');
    }
  }

  // CLIPBOARD
  function copyToClipboard(text,target){
    var btn=document.querySelector('.btn-copy[data-target="'+target+'"]');
    var orig=btn.innerHTML;

    function ok(){
      btn.classList.add('copied');
      btn.innerHTML='✓ Copied!';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.innerHTML=orig;
        updateLastIndicator(target);
      },1500);
    }
    function fail(){
      prompt('Copy otomatis diblokir di file://. Copy manual dari sini:',text);
    }

    var ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px'; ta.style.top='-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    var s=false;
    try{s=document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);

    if(s) ok();
    else if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(ok).catch(fail);
    else fail();
  }

  // TABS
  function switchTab(tab){
    var ts=document.querySelectorAll('.tab');
    for(var i=0;i<ts.length;i++) ts[i].classList.toggle('active',ts[i].getAttribute('data-tab')===tab);
    var ps=document.querySelectorAll('.panel');
    for(var j=0;j<ps.length;j++) ps[j].classList.toggle('active',ps[j].getAttribute('data-panel')===tab);
    try{localStorage.setItem(SK.TAB,tab);}catch(e){}
  }
  var tabEls=document.querySelectorAll('.tab');
  for(var i=0;i<tabEls.length;i++){
    (function(t){t.addEventListener('click',function(){switchTab(t.getAttribute('data-tab'));});})(tabEls[i]);
  }

  // SHORTCUTS
  document.addEventListener('keydown',function(e){
    var tag=document.activeElement.tagName.toLowerCase();
    if(tag==='textarea'||tag==='input'||tag==='select') return;
    if(e.ctrlKey&&e.key==='1'){e.preventDefault();switchTab('gpt');}
    if(e.ctrlKey&&e.key==='2'){e.preventDefault();switchTab('gemini');}
    if(e.ctrlKey&&e.key==='3'){e.preventDefault();switchTab('zai');}
    if(e.ctrlKey&&e.key==='4'){e.preventDefault();switchTab('claude');}
  });

  // CLEAR ALL
  document.getElementById('btnClear').addEventListener('click',function(){
    if(!confirm('Yakin hapus semua?')) return;
    els.darmaGpt.value=''; els.darmaGemini.value=''; els.darmaZai.value=''; els.darmaClaude.value='';
    els.respGpt.value=''; els.respGemini.value=''; els.respZai.value=''; els.respClaude.value='';
    els.custom.value=''; els.mode.value='antiyesman'; toggleCustom('antiyesman');
    if(focusedAi) toggleFocusMode(focusedAi);
    var bs=document.querySelectorAll('.btn-copy');
    for(var i=0;i<bs.length;i++) bs[i].classList.remove('last-copy');
    for(var k in timers){if(timers[k]) clearTimeout(timers[k]);}
    els.saveInd.classList.remove('show');
    var ks=Object.keys(SK);
    for(var i=0;i<ks.length;i++){try{localStorage.removeItem(SK[ks[i]]);}catch(e){}}
  });

  // SAVE
  document.getElementById('btnSave').addEventListener('click',function(){
    var data={
      version:'0.1r2',
      darmaGpt:els.darmaGpt.value, darmaGemini:els.darmaGemini.value,
      darmaZai:els.darmaZai.value, darmaClaude:els.darmaClaude.value,
      respGpt:els.respGpt.value, respGemini:els.respGemini.value,
      respZai:els.respZai.value, respClaude:els.respClaude.value,
      mode:els.mode.value, customInstruction:els.custom.value,
      activeTab:getActiveTab(), lastCopy:getLastCopy()
    };
    var json=JSON.stringify(data,null,2);
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var now=new Date();
    var pad=function(n){return String(n).padStart(2,'0');};
    var fn='OT-session-'+now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+'-'+pad(now.getHours())+pad(now.getMinutes())+'.json';
    var a=document.createElement('a'); a.href=url; a.download=fn; a.click();
    URL.revokeObjectURL(url);
  });

  function getActiveTab(){
    var a=document.querySelector('.tab.active');
    return a?a.getAttribute('data-tab'):'gpt';
  }
  function getLastCopy(){
    try{return localStorage.getItem(SK.LAST_COPY)||'';}catch(e){return'';}
  }

  // LOAD
  document.getElementById('btnLoad').addEventListener('click',function(){
    els.fileInput.value=''; els.fileInput.click();
  });
  els.fileInput.addEventListener('change',function(ev){
    var file=ev.target.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(e){
      var data;
      try{data=JSON.parse(e.target.result);}catch(err){
        alert('Error: File JSON tidak valid atau corrupt.'); return;
      }
      if(typeof data!=='object'||data===null||
        typeof data.respGpt==='undefined'||typeof data.respGemini==='undefined'||
        typeof data.respClaude==='undefined'){
        alert('Error: Struktur JSON tidak sesuai format Orchestrator Terminal.'); return;
      }
      if(!confirm('Ini akan menimpa semua data saat ini. Lanjutkan?')) return;

      els.darmaGpt.value=data.darmaGpt||''; els.darmaGemini.value=data.darmaGemini||'';
      els.darmaZai.value=data.darmaZai||''; els.darmaClaude.value=data.darmaClaude||'';
      els.respGpt.value=data.respGpt||''; els.respGemini.value=data.respGemini||'';
      els.respZai.value=data.respZai||''; els.respClaude.value=data.respClaude||'';
      els.mode.value=data.mode||'antiyesman'; els.custom.value=data.customInstruction||'';
      toggleCustom(els.mode.value);
      if(data.activeTab) switchTab(data.activeTab);
      if(data.lastCopy) updateLastIndicator(data.lastCopy);

      try{
        localStorage.setItem(SK.DARMA_GPT,els.darmaGpt.value);
        localStorage.setItem(SK.DARMA_GEMINI,els.darmaGemini.value);
        localStorage.setItem(SK.DARMA_ZAI,els.darmaZai.value);
        localStorage.setItem(SK.DARMA_CLAUDE,els.darmaClaude.value);
        localStorage.setItem(SK.RESP_GPT,els.respGpt.value);
        localStorage.setItem(SK.RESP_GEMINI,els.respGemini.value);
        localStorage.setItem(SK.RESP_ZAI,els.respZai.value);
        localStorage.setItem(SK.RESP_CLAUDE,els.respClaude.value);
        localStorage.setItem(SK.MODE,els.mode.value);
        localStorage.setItem(SK.CUSTOM,els.custom.value);
        localStorage.setItem(SK.TAB,data.activeTab||'gpt');
        localStorage.setItem(SK.LAST_COPY,data.lastCopy||'');
      }catch(err){}
    };
    reader.readAsText(file);
  });

  // AUTO-LOAD
  function loadFromStorage(){
    try{
      els.darmaGpt.value=localStorage.getItem(SK.DARMA_GPT)||'';
      els.darmaGemini.value=localStorage.getItem(SK.DARMA_GEMINI)||'';
      els.darmaZai.value=localStorage.getItem(SK.DARMA_ZAI)||'';
      els.darmaClaude.value=localStorage.getItem(SK.DARMA_CLAUDE)||'';
      els.respGpt.value=localStorage.getItem(SK.RESP_GPT)||'';
      els.respGemini.value=localStorage.getItem(SK.RESP_GEMINI)||'';
      els.respZai.value=localStorage.getItem(SK.RESP_ZAI)||'';
      els.respClaude.value=localStorage.getItem(SK.RESP_CLAUDE)||'';
      els.mode.value=localStorage.getItem(SK.MODE)||'antiyesman';
      els.custom.value=localStorage.getItem(SK.CUSTOM)||'';
      toggleCustom(els.mode.value);
      var tab=localStorage.getItem(SK.TAB); if(tab) switchTab(tab);
      var lc=localStorage.getItem(SK.LAST_COPY); if(lc) updateLastIndicator(lc);
    }catch(e){}
  }
  loadFromStorage();
})();
</script>
</body>
</html>
